name: Sync Fork with Upstream

on:
  schedule:
    # 每小时同步一次
    - cron: '0 * * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 允许 push 到仓库
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0   # 获取完整历史，确保 merge 不出问题

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/maka-agent/maka-agent.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check for updates
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "Already up to date — nothing to sync."
            echo "needs_sync=false" >> $GITHUB_OUTPUT
          else
            echo "Upstream has new commits — syncing..."
            echo "needs_sync=true" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream/main
        if: steps.check.outputs.needs_sync == 'true'
        run: |
          git merge upstream/main --no-edit

      - name: Push to origin
        if: steps.check.outputs.needs_sync == 'true'
        run: |
          git push origin main
